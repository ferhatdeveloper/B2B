services:
  postgres:
    image: postgres:16-alpine
    container_name: b2b_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: b2b_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - b2b_postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./database/merkez:/docker-entrypoint-initdb.d/merkez:ro
      - ./database/tenants:/docker-entrypoint-initdb.d/tenants:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d b2b_local"]
      interval: 5s
      timeout: 5s
      retries: 12

  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: b2b_postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/b2b_local
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_SCHEMAS: public,logic,b2b
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3000
    ports:
      - "3002:3000"

  postgrest-merkez:
    image: postgrest/postgrest:v12.2.0
    container_name: b2b_postgrest_merkez
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/merkez_db
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_SCHEMAS: public
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3000
    ports:
      - "3001:3000"

  postgrest-zetem:
    image: postgrest/postgrest:v12.2.0
    container_name: b2b_postgrest_zetem
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/zetem_db
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_SCHEMAS: public,logic,b2b
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3000
    ports:
      - "3003:3000"

volumes:
  b2b_postgres_data:
