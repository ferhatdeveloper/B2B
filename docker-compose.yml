services:
  postgres:
    image: postgres:16-alpine
    container_name: b2b_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: b2b_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - b2b_postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d b2b_local"]
      interval: 5s
      timeout: 5s
      retries: 12

  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: b2b_postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/b2b_local
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_SCHEMAS: public,logic,b2b
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3000
      # NOTE: PostgREST treats PGRST_SERVER_CORS_ALLOWED_ORIGINS as a literal,
      # comma-separated allowlist (no "*" wildcard). When unset, PostgREST is
      # permissive and reflects the request Origin, which is what local browser
      # dev (Flutter web on :8080, etc.) needs. So we intentionally leave it unset.
    ports:
      - "3002:3000"

volumes:
  b2b_postgres_data:
