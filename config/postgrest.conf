# PostgREST — B2B REST API
# Calistirma:
#   PGRST_DB_URI="postgres://postgres:postgres@127.0.0.1:5432/b2b_local" postgrest config/postgrest.conf

# Gercek sifreyi bu dosyaya yazmayin; PGRST_DB_URI ortam degiskeni ile override edin.
db-uri = "postgres://postgres:postgres@127.0.0.1:5432/b2b_local"

# Kimlik dogrulama olmadan kullanilacak Postgres rolu.
db-anon-role = "anon"

# B2B icin acilan semalar.
db-schemas = "public,logic,b2b"

# RetailEX ile ayni port deseni: pg_bridge icin 3001 ayrilir, PostgREST 3002.
server-port = 3002
server-host = "0.0.0.0"

# Production'da yalnizca izinli origin'leri yazin.
server-cors-allowed-origins = "*"

# JWT production icin onerilir.
# jwt-secret = "env:PGRST_JWT_SECRET"
# jwt-secret-is-base64 = false
